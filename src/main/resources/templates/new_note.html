<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Create Note</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h2>Create Note</h2>

    <form
            th:action="@{/notes}"
            method="post"
            th:object="${noteRequest}">

        <div class="mb-3">

            <label>Title</label>

            <input
                    class="form-control"
                    th:field="*{title}">

        </div>

        <div class="mb-3">

            <label>Content</label>

            <textarea
                    rows="15"
                    class="form-control"
                    th:field="*{content}">
            </textarea>

        </div>

        <button class="btn btn-success">
            Save Note
        </button>

    </form>

</div>

</body>
</html>
