<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Create Note')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container pb-5">

    <h1 class="h3 mb-4">Create Note</h1>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="@{/notes}" method="post" th:object="${noteRequest}">

                <div class="mb-3">
                    <label class="form-label" for="title">Title</label>
                    <input id="title" class="form-control" th:field="*{title}"
                           th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="content">Content</label>
                    <textarea id="content" rows="12" class="form-control" th:field="*{content}"
                              th:classappend="${#fields.hasErrors('content')} ? 'is-invalid'"></textarea>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="tags">Tags</label>
                    <input id="tags" class="form-control" th:field="*{tags}"
                           placeholder="java, spring, security">
                    <div class="form-text">Separate tags with commas. Existing tags are reused automatically.</div>
                </div>

                <button type="submit" class="btn btn-primary">Save Note</button>
                <a href="/notes" class="btn btn-outline-secondary">Cancel</a>

            </form>
        </div>
    </div>

</div>

</body>
</html>
