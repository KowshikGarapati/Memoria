<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register • Memoria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        .register-box {
            width: 100%;
            max-width: 480px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            padding: 2rem;
        }
    </style>
</head>
<body>

<div class="register-box">
    <h1 class="h3 mb-1">Create account</h1>
    <p class="text-muted mb-4">Join Memoria</p>

    <form th:action="@{/register}" method="post" th:object="${registerRequest}">

        <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger mb-3">
            <span th:each="err : ${#fields.globalErrors()}" th:text="${err}"></span>
        </div>
        <div class="mb-3">
            <label class="form-label" for="username">Username</label>
            <input id="username" type="text" class="form-control" th:field="*{username}"
                   th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label" for="email">Email</label>
            <input id="email" type="email" class="form-control" th:field="*{email}"
                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>
        <div class="mb-3">
            <label class="form-label" for="password">Password</label>
            <input id="password" type="password" class="form-control" th:field="*{password}"
                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
        </div>
        <div class="mb-4">
            <label class="form-label" for="confirmedPassword">Confirm Password</label>
            <input id="confirmedPassword" type="password" class="form-control" th:field="*{confirmedPassword}"
                   th:classappend="${#fields.hasErrors('confirmedPassword')} ? 'is-invalid'">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmedPassword')}" th:errors="*{confirmedPassword}"></div>
        </div>
        <button type="submit" class="btn btn-dark w-100">Register</button>
    </form>

    <p class="text-center mt-4 mb-0">
        Already have an account?
        <a href="/login">Login</a>
    </p>
</div>

</body>
</html>
