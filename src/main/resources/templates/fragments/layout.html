<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' • Memoria'">Memoria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .tag-badge { font-size: 0.75rem; }
        .note-meta { font-size: 0.875rem; color: #6c757d; }
    </style>
</head>
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand fw-semibold" href="/notes">Memoria</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/notes">Home</a>
            <a class="nav-link" href="/notes/new">New Note</a>
            <a class="nav-link" href="/profile">Profile</a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-link nav-link text-decoration-none">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div th:fragment="alerts">
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
</div>

<div th:fragment="tags(note)" class="mb-2">
    <span th:if="${note.tags == null or note.tags.isEmpty()}" class="text-muted note-meta">No tags</span>
    <span th:each="tag : ${note.tags}"
          class="badge text-bg-secondary tag-badge me-1"
          th:text="${tag.name}"></span>
</div>

</body>
</html>
