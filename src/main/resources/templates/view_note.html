<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('View Note')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container pb-5">

    <div th:replace="~{fragments/layout :: alerts}"></div>

    <a href="/notes" class="btn btn-outline-secondary btn-sm mb-3">Back to Home</a>

    <div class="card shadow-sm">
        <div class="card-body">
            <h1 class="h3" th:text="${note.title}"></h1>
            <div th:replace="~{fragments/layout :: tags(${note})}"></div>
            <div class="note-meta mb-4">
                <div>Created: <span th:text="${#temporals.format(note.createdAt, 'MMM d, yyyy HH:mm')}"></span></div>
                <div>Updated: <span th:text="${#temporals.format(note.updatedAt, 'MMM d, yyyy HH:mm')}"></span></div>
            </div>
            <div class="border rounded p-3 bg-white" style="white-space: pre-wrap;" th:text="${note.content}"></div>
            <div class="mt-4">
                <a th:href="@{/notes/{id}/edit(id=${note.id})}" class="btn btn-warning">Edit</a>
                <form th:action="@{/notes/{id}/delete(id=${note.id})}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-danger"
                            onclick="return confirm('Delete this note permanently?');">
                        Delete
                    </button>
                </form>
            </div>
        </div>
    </div>

</div>

</body>
</html>
