<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Edit Note</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h2>Edit Note</h2>

    <form
            th:action="@{/notes/{id}/edit(id=${noteRequest.id})}"
            method="post"
            th:object="${noteRequest}">

        <div class="mb-3">

            <label>Title</label>

            <input
                    class="form-control"
                    th:field="*{title}">

        </div>

        <div class="mb-3">

            <label>Content</label>

            <textarea
                    rows="15"
                    class="form-control"
                    th:field="*{content}">
            </textarea>

        </div>

        <button class="btn btn-primary">
            Update
        </button>

    </form>

</div>

</body>

</html>
