<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Home')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container pb-5">

    <div th:replace="~{fragments/layout :: alerts}"></div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-1">Your Notes</h1>
            <p class="text-muted mb-0">
                Signed in as <span th:text="${loggedUser.username}"></span>
            </p>
        </div>
        <a href="/notes/new" class="btn btn-primary">New Note</a>
    </div>

    <form th:action="@{/notes/search}" method="get" class="mb-4">
        <div class="input-group">
            <input class="form-control"
                   type="text"
                   name="query"
                   th:value="${searchQuery}"
                   placeholder="Search by title, content, or tags...">
            <button class="btn btn-outline-secondary" type="submit">Search</button>
            <a th:if="${searchQuery != null and !#strings.isEmpty(searchQuery)}"
               href="/notes"
               class="btn btn-outline-secondary">Clear</a>
        </div>
    </form>

    <div th:if="${notes == null or notes.isEmpty()}" class="alert alert-light border">
        <span th:if="${searchQuery != null and !#strings.isEmpty(searchQuery)}">
            No notes matched your search.
        </span>
        <span th:unless="${searchQuery != null and !#strings.isEmpty(searchQuery)}">
            You have no notes yet. Create your first one.
        </span>
    </div>

    <div class="row g-3">
        <div class="col-md-6 col-lg-4" th:each="note : ${notes}">
            <div class="card h-100 shadow-sm">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title" th:text="${note.title}"></h5>
                    <div th:replace="~{fragments/layout :: tags(${note})}"></div>
                    <p class="card-text text-muted flex-grow-1"
                       th:text="${#strings.abbreviate(note.content, 120)}"></p>
                    <div class="note-meta mb-3">
                        <div>Created: <span th:text="${#temporals.format(note.createdAt, 'MMM d, yyyy HH:mm')}"></span></div>
                        <div>Updated: <span th:text="${#temporals.format(note.updatedAt, 'MMM d, yyyy HH:mm')}"></span></div>
                    </div>
                    <a th:href="@{/notes/{id}(id=${note.id})}" class="btn btn-outline-primary btn-sm align-self-start">
                        Open
                    </a>
                </div>
            </div>
        </div>
    </div>

</div>

</body>
</html>
