<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">
    <title>Memoria</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center">

        <div>
            <h2>Welcome,
                <span th:text="${loggedUser.username}"></span>
            </h2>

            <p class="text-muted"
               th:text="${loggedUser.email}">
            </p>
        </div>

        <div>

            <a href="/notes/new"
               class="btn btn-primary">
                New Note
            </a>

            <form th:action="@{/logout}"
                  method="post"
                  class="d-inline">

                <button class="btn btn-danger">
                    Logout
                </button>

            </form>

        </div>

    </div>

    <hr>

    <form th:action="@{/notes/search}"
          method="get"
          class="mb-4">

        <input
                class="form-control"
                type="text"
                name="query"
                placeholder="Search notes...">

    </form>

    <div class="row">

        <div class="col-md-4 mb-3"
             th:each="note : ${notes}">

            <div class="card">

                <div class="card-body">

                    <h5 th:text="${note.title}"></h5>

                    <p
                            th:text="${#strings.abbreviate(note.content,120)}">
                    </p>

                    <a
                            th:href="@{/notes/{id}(id=${note.id})}"
                            class="btn btn-outline-primary">

                        Open

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
