<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Profile')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container pb-5">

    <div th:replace="~{fragments/layout :: alerts}"></div>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h3 mb-1" th:text="${loggedUser.username}"></h1>
                    <p class="text-muted mb-4" th:text="${loggedUser.email}"></p>

                    <div class="row g-3 mb-4">
                        <div class="col-sm-6">
                            <div class="border rounded p-3 bg-light">
                                <div class="text-muted small">Username</div>
                                <div class="fw-semibold" th:text="${loggedUser.username}"></div>
                            </div>
                        </div>
                        <div class="col-sm-6">
                            <div class="border rounded p-3 bg-light">
                                <div class="text-muted small">Email</div>
                                <div class="fw-semibold" th:text="${loggedUser.email}"></div>
                            </div>
                        </div>
                        <div class="col-sm-6">
                            <div class="border rounded p-3 bg-light">
                                <div class="text-muted small">Total Notes</div>
                                <div class="fw-semibold" th:text="${noteCount}"></div>
                            </div>
                        </div>
                    </div>

                    <a href="/notes" class="btn btn-primary">View My Notes</a>
                    <a href="/notes/new" class="btn btn-outline-primary">Create Note</a>
                </div>
            </div>
        </div>
    </div>

</div>

</body>
</html>
